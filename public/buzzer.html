<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Jeopardy! — Buzzer</title>
  <meta name="description" content="Join a Jeopardy game and buzz in to answer questions." />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="stylesheet" href="buzzer.css" />
</head>
<body>

  <!-- ── JOIN SCREEN ── -->
  <div id="screen-join" class="screen active">
    <div class="join-card">
      <div class="logo">🎯 JEOPARDY!</div>
      <h1>Join Game</h1>
      <input id="input-code" class="field" type="text" maxlength="6"
        placeholder="Game Code (e.g. HX7A2Z)" autocomplete="off" autocapitalize="characters" />
      <input id="input-name" class="field" type="text" maxlength="30"
        placeholder="Your Name" autocomplete="off" />
      <button id="btn-join" class="btn-join">Join →</button>
      <p id="join-error" class="error-msg" style="display:none"></p>
    </div>
  </div>

  <!-- ── WAITING SCREEN ── -->
  <div id="screen-waiting" class="screen">
    <div class="waiting-inner">
      <div class="game-badge" id="waiting-game-name">Loading...</div>
      <div class="waiting-icon">⏳</div>
      <h2>Waiting for host<span class="dots">...</span></h2>
      <p class="sub">A question will appear when the host opens one.</p>
      <div class="player-list-label">Players in room:</div>
      <div id="player-list" class="player-list"></div>
    </div>
  </div>

  <!-- ── BUZZER SCREEN ── -->
  <div id="screen-buzzer" class="screen">
    <div class="buzzer-inner">
      <div id="buzz-status" class="buzz-status">TAP TO BUZZ!</div>
      <button id="btn-buzzer" class="buzzer-btn" aria-label="Buzz!">
        <span class="buzzer-label">BUZZ!</span>
      </button>
      <div id="buzz-position" class="buzz-position" style="display:none"></div>
    </div>
  </div>

  <script src="buzzer.js"></script>
</body>
</html>
